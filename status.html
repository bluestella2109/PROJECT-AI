<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>予約状況 | PROJECT AI</title>

    <link rel="stylesheet"
          href="css/status.css">

</head>

<body>

    <div class="background-grid"></div>

    <div class="container">

        <div class="card">

            <h1>PROJECT AI</h1>

            <p class="subtitle">

                あなたの予約状況

            </p>

            <!-- 自分の受付番号 -->

            <div class="status-box">

                <h2>受付番号</h2>

                <div
                    id="ticket"
                    class="big-number">

                    AI-001

                </div>

            </div>

            <!-- ステータス -->

            <div class="status-box">

                <h2>現在の状態</h2>

                <div
                    id="status"
                    class="status waiting">

                    待機中

                </div>

            </div>

            <!-- 呼び出し番号 -->

            <div class="status-box">

                <h2>現在呼び出し中</h2>

                <div
                    id="currentNumber"
                    class="big-number">

                    AI-001

                </div>

            </div>

            <!-- 自分の順番 -->

            <div class="status-box">

                <h2>あなたの順番</h2>

                <div
                    id="queuePosition"
                    class="big-number">

                    --

                </div>

            </div>

            <!-- 待機人数 -->

            <div class="status-box">

                <h2>待機人数</h2>

                <div
                    id="waitingCount"
                    class="big-number">

                    --

                </div>

            </div>

            <!-- 待ち時間 -->

            <div class="status-box">

                <h2>待ち時間</h2>

                <div
                    id="waitingTime"
                    class="big-number">

                    約--分

                </div>

            </div>

            <!-- 人数 -->

            <div class="status-box">

                <h2>予約人数</h2>

                <div
                    id="peopleDisplay"
                    class="big-number">

                    --

                </div>

            </div>

            <!-- キャンセル -->

            <button
                id="cancelButton"
                class="cancel-btn">

                予約をキャンセル

            </button>

        </div>

    </div>

    <!-- 呼び出し通知 -->

    <div
        id="callNotice">

    </div>

    <!-- 完了画面 -->

    <div
        id="completeNotice">

    </div>

    <!-- 呼び出し履歴 -->

    <div class="history-card">

        <h2>

            呼び出し履歴

        </h2>

        <ul id="history">

        </ul>

    </div>

    <!-- Firebase -->

    <script
        type="module"
        src="js/firebase.js">

    </script>

    <!-- Status -->

    <script
        type="module"
        src="js/status.js">

    </script>

</body>

</html>
