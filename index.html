<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<body>

<!-- ローディング -->
<div id="loading-screen">
    <div class="loader">
        <h1>PROJECT AI</h1>
        <p>INITIALIZING SYSTEM...</p>

        <div class="progress">
            <div id="progress-bar"></div>
        </div>
    </div>
</div>

<!-- 背景 -->
<div class="background-grid"></div>

<!-- メイン -->
<main>

<header>

<h1 class="title">
PROJECT AI
</h1>

<h2 class="subtitle">
～人類最後のアップデートが始まる～
</h2>

<p class="system-status">
AI CENTRAL SERVER : ONLINE
</p>

</header>

<!-- メイン画像 -->

<section class="hero">

<img src="assets/images/main.jpg" alt="PROJECT AI">

</section>

<!-- ストーリー -->

<section class="card">

<h2>MISSION</h2>

<p>

暴走したAIによって閉鎖された研究施設。

あなたは最後の被験者として施設へ送り込まれる。

謎を解き、生還せよ。

</p>

</section>

<!-- 現在の状況 -->

<section class="card status">

<h2>SYSTEM STATUS</h2>

<div class="status-box">

<div class="status-item">

<span>現在実験中</span>

<strong id="currentNumber">
AI-000
</strong>

</div>

<div class="status-item">

<span>待機組数</span>

<strong id="waitingGroups">
0組
</strong>

</div>

<div class="status-item">

<span>待機人数</span>

<strong id="waitingPeople">
0人
</strong>

</div>

<div class="status-item">

<span>推定待ち時間</span>

<strong id="waitTime">
0分
</strong>

</div>

</div>

</section>

<!-- ボタン -->

<section class="buttons">

<a href="reserve.html" class="main-button">

MISSION START

</a>

<a href="status.html" class="sub-button">

予約状況を見る

</a>

</section>

<!-- フッター -->

<footer>

<p>

PROJECT AI © 2026

</p>

</footer>

</main>

<script src="js/app.js"></script>
