<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLOJECT AI 予約システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grid-bg"></div>

  <nav class="glass-nav">
    <div class="logo">CYBER-RESERVE</div>
    <div class="nav-links">
      <button onclick="showPage('hero')">TOP</button>
      <button onclick="showPage('reserve')">予約</button>
      <button onclick="showPage('status')">状況確認</button>
      <button onclick="showPage('admin')" class="admin-link">管理</button>
    </div>
  </nav>

  <main class="container">
    <section id="page-hero" class="page active">
      <div class="glass-card hero-card">
        <h1 class="neon-text-blue">FUTURE ATTRACTION</h1>
        <p class="subtitle">文化祭「PLOJECT AI」の予約エントリー</p>
        <div class="hero-buttons">
          <button class="neon-btn blue" onclick="showPage('reserve')">予約する</button>
          <button class="neon-btn pink" onclick="showPage('status')">現在の状況</button>
        </div>
      </div>
    </section>

    <section id="page-reserve" class="page">
      <div class="glass-card">
        <h2 class="neon-text-pink">新規予約</h2>
        <div id="reserve-form-container">
          <label for="people-count">参加人数 (1〜10名):</label>
          <select id="people-count" class="glass-input">
            <option value="1">1人</option>
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人</option>
            <option value="6">6人</option>
            <option value="7">7人</option>
            <option value="8">8人</option>
            <option value="9">9人</option>
            <option value="10">10人</option>
          </select>
          <button id="btn-submit-reserve" class="neon-btn blue" onclick="makeReservation()">予約を確定する</button>
        </div>
        <div id="already-reserved-msg" class="hidden">
          <p class="warning-text">※すでに予約済みです（1端末1回のみ）。</p>
          <button class="neon-btn pink" onclick="showPage('status')">自分の予約状況を見る</button>
        </div>
      </div>
    </section>

    <section id="page-status" class="page">
      <div class="glass-card">
        <h2 class="neon-text-blue">リアルタイム状況</h2>
        
        <div class="status-dashboard">
          <div class="status-box">
            <span class="label">現在呼び出し中</span>
            <span id="current-calling-num" class="big-number neon-text-pink">---</span>
          </div>
          <div class="status-box">
            <span class="label">全体待機組数</span>
            <span id="total-waiting-count" class="big-number">0</span> 組
          </div>
        </div>

        <hr class="neon-divider">

        <div id="my-ticket-area" class="hidden">
          <h3>あなたの予約情報</h3>
          <div class="ticket-info">
            <p>受付番号: <strong id="my-ticket-id" class="neon-text-blue">---</strong> 
               <button class="small-btn" onclick="copyTicketId()">コピー</button>
            </p>
            <p>ステータス: <span id="my-status-badge" class="badge">---</span></p>
            <p>あなたの順番: あと <strong id="my-position">--</strong> 組</p>
            <p>予想待ち時間: 約 <strong id="my-wait-time">--</strong> 分</p>
          </div>
          <button class="neon-btn danger" onclick="cancelReservation()">予約をキャンセルする</button>
        </div>

        <div id="no-ticket-area">
          <p>現在、端末に保持されている予約はありません。</p>
        </div>
      </div>
    </section>

    <section id="page-admin" class="page">
      <div class="glass-card">
        <h2 class="neon-text-pink">運営管理パネル</h2>

        <div id="admin-login-area">
          <input type="email" id="admin-email" class="glass-input" placeholder="管理者メールアドレス">
          <input type="password" id="admin-pass" class="glass-input" placeholder="パスワード">
          <button class="neon-btn blue" onclick="adminLogin()">ログイン</button>
        </div>

        <div id="admin-panel-area" class="hidden">
          <div class="admin-header">
            <span>管理者としてログイン中</span>
            <button class="small-btn" onclick="adminLogout()">ログアウト</button>
          </div>

          <div class="admin-controls">
            <button class="neon-btn blue lg" onclick="callNext()">▶ 次の組を呼び出す</button>
          </div>

          <div class="admin-queue">
            <h3>待機一覧</h3>
            <ul id="admin-waiting-list" class="queue-list"></ul>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="notification-modal" class="modal hidden">
    <div class="modal-content glass-card blink-animation">
      <h2 class="neon-text-pink">お呼び出し</h2>
      <p id="modal-msg">あなたの番号が呼び出されました！受付へお越しください。</p>
      <button class="neon-btn blue" onclick="closeModal()">確認しました</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
